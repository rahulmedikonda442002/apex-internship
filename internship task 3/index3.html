<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3 - Responsive Design, Quiz & API</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>

    <header>
        <h1>Advanced CSS & JavaScript Project</h1>
    </header>

    <!-- Quiz Section -->
    <section class="quiz-container">
        <h2>JavaScript Quiz</h2>

        <p id="question">Question appears here</p>

        <div id="answers">
            <button class="answer-btn"></button>
            <button class="answer-btn"></button>
            <button class="answer-btn"></button>
            <button class="answer-btn"></button>
        </div>

        <button id="next-btn">Next Question</button>

        <p id="score"></p>
    </section>

    <!-- API Section -->
    <section class="api-container">
        <h2>Random Joke API</h2>
        <button id="jokeBtn">Get Joke</button>
        <p id="joke"></p>
    </section>

    <script src="script3.js"></script>

</body>
</html>
